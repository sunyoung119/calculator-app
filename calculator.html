<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.calculator {
    background: #16213e;
    border-radius: 20px;
    padding: 24px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.display {
    background: #0f3460;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: right;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    word-break: break-all;
}
.display .input {
    color: #a8b2d1;
    font-size: 18px;
    min-height: 28px;
}
.display .result {
    color: #e2e8f0;
    font-size: 36px;
    font-weight: bold;
    margin-top: 8px;
}
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}
.btn {
    border: none;
    border-radius: 12px;
    padding: 18px 0;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: #1a1a40;
    color: #e2e8f0;
}
.btn:hover { filter: brightness(1.2); }
.btn:active { transform: scale(0.95); }
.btn-operator { background: #e94560; color: #fff; }
.btn-equals { background: #533483; color: #fff; grid-column: span 2; }
.btn-clear { background: #2d2d5e; }
.btn-zero { grid-column: span 2; }
</style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="input" id="inputDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
    </div>
    <div class="buttons">
        <button class="btn btn-clear" onclick="clearAll()">C</button>
        <button class="btn btn-clear" onclick="backspace()">⌫</button>
        <button class="btn btn-operator" onclick="append('%')">%</button>
        <button class="btn btn-operator" onclick="append('/')">÷</button>

        <button class="btn" onclick="append('7')">7</button>
        <button class="btn" onclick="append('8')">8</button>
        <button class="btn" onclick="append('9')">9</button>
        <button class="btn btn-operator" onclick="append('*')">×</button>

        <button class="btn" onclick="append('4')">4</button>
        <button class="btn" onclick="append('5')">5</button>
        <button class="btn" onclick="append('6')">6</button>
        <button class="btn btn-operator" onclick="append('-')">−</button>

        <button class="btn" onclick="append('1')">1</button>
        <button class="btn" onclick="append('2')">2</button>
        <button class="btn" onclick="append('3')">3</button>
        <button class="btn btn-operator" onclick="append('+')">+</button>

        <button class="btn btn-zero" onclick="append('0')">0</button>
        <button class="btn" onclick="append('.')">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>
    </div>
</div>

<script>
const inputDisplay = document.getElementById('inputDisplay');
const resultDisplay = document.getElementById('resultDisplay');
let expression = '';

function append(val) {
    expression += val;
    inputDisplay.textContent = expression;
    try {
        const result = Function('"use strict"; return (' + expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-') + ')')();
        resultDisplay.textContent = Number.isInteger(result) ? result : parseFloat(result.toFixed(10));
    } catch {
        resultDisplay.textContent = '...';
    }
}

function calculate() {
    try {
        const sanitized = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        const result = Function('"use strict"; return (' + sanitized + ')')();
        const display = Number.isInteger(result) ? result : parseFloat(result.toFixed(10));
        resultDisplay.textContent = display;
        expression = String(display);
        inputDisplay.textContent = expression;
    } catch {
        resultDisplay.textContent = '오류';
    }
}

function clearAll() {
    expression = '';
    inputDisplay.textContent = '';
    resultDisplay.textContent = '0';
}

function backspace() {
    expression = expression.slice(0, -1);
    inputDisplay.textContent = expression;
    if (!expression) { resultDisplay.textContent = '0'; return; }
    try {
        const result = Function('"use strict"; return (' + expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-') + ')')();
        resultDisplay.textContent = Number.isInteger(result) ? result : parseFloat(result.toFixed(10));
    } catch {
        resultDisplay.textContent = '...';
    }
}

document.addEventListener('keydown', e => {
    if ('0123456789.+-*/%'.includes(e.key)) append(e.key);
    else if (e.key === 'Enter') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
});
</script>
</body>
</html>
